name: ubuntu

on: [push, pull_request]

permissions: read-all

jobs:
  ubuntu:
    strategy:
      fail-fast: false
      matrix:
        compiler:
        - { cc: "gcc-14",    cxx: "g++-14",      os: "ubuntu-24.04" }
        - { cc: "clang-18",  cxx: "clang++-18",  os: "ubuntu-24.04" }

    name: "${{ matrix.compiler.cc }}"
    runs-on: ${{ matrix.compiler.os }}
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Python tooling smoke
      run: |
        python -m py_compile tools/create_example_graph.py
        python tools/create_example_graph.py --help

    - uses: actions/cache@v4
      with:
        path: tensorflow/python
        key: ${{ runner.os }}-${{ runner.arch }}-python-3.12-tensorflow-2.21.0

    - name: Build Release
      run: |
        rm -rf build
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }}
        cmake --build . -j 4 --config Release
        ctest --output-on-failure -C Release

    - name: Build Debug
      run: |
        rm -rf build
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }}
        cmake --build . -j 4 --config Debug
        ctest --output-on-failure -C Debug

  sanitizers:
    name: "clang-18 sanitizers"
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - uses: actions/cache@v4
      with:
        path: tensorflow/python
        key: ${{ runner.os }}-${{ runner.arch }}-python-3.12-tensorflow-2.21.0

    - name: Build and test with ASan/UBSan
      env:
        # TensorFlow's prebuilt shared libraries keep process-lifetime state; keep
        # LSan disabled here and cover local tensor ownership with doctest checks.
        ASAN_OPTIONS: detect_leaks=0:strict_init_order=1
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
      run: |
        rm -rf build-sanitizers
        mkdir build-sanitizers
        cd build-sanitizers
        cmake .. \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_COMPILER=clang++-18 \
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g" \
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
        cmake --build . --target base.t -j 4 --config Debug
        ctest --output-on-failure -C Debug -R "^base\\.t$"
