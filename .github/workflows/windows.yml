name: windows

on: [push, pull_request]

permissions: read-all

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]
        config: [Release, Debug]

    name: "${{ matrix.os }} / x64 / ${{ matrix.config }}"
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Python tooling smoke
      run: |
        python -m py_compile tools/create_example_graph.py
        python tools/create_example_graph.py --help

    - uses: actions/cache@v4
      with:
        path: build/_deps/tensorflow/python
        key: ${{ runner.os }}-${{ runner.arch }}-python-3.12-tensorflow-2.21.0

    - name: Configure
      run: cmake -S . -B build -A x64

    - name: Build
      run: cmake --build build --parallel --config ${{ matrix.config }}

    - name: Test
      run: ctest --test-dir build --output-on-failure -C ${{ matrix.config }}
